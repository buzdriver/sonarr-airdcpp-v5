name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get base image digest
        id: base
        run: |
          DIGEST=$(docker buildx imagetools inspect ghcr.io/linuxserver/baseimage-ubuntu:focal --format '{{.Manifest.Digest}}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Restore previous digest
        id: cache
        uses: actions/cache@v4
        with:
          path: .digest
          key: base-digest

      - name: Load previous digest
        id: prev
        run: |
          if [ -f .digest ]; then
            echo "digest=$(cat .digest)" >> $GITHUB_OUTPUT
          else
            echo "digest=none" >> $GITHUB_OUTPUT
          fi

      - name: Check if changed
        id: changed
        run: |
          if [ "${{ steps.base.outputs.digest }}" != "${{ steps.prev.outputs.digest }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Write summary
        if: steps.changed.outputs.changed == 'true'
        run: |
          echo "## 🔄 Base image updated" >> $GITHUB_STEP_SUMMARY
          echo "- Old: ${{ steps.prev.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "- New: ${{ steps.base.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: buzdriver/sonarr-airdcpp-v5
          tags: |
            # latest ONLY on release
            type=raw,value=latest,enable={{is_tag}}

            # version tags
            type=ref,event=tag

            # nightly builds
            type=raw,value=nightly,enable={{is_schedule}}

      - name: Build and push
        if: github.event_name != 'schedule' || steps.changed.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.amd64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Save digest
        if: steps.changed.outputs.changed == 'true'
        run: echo "${{ steps.base.outputs.digest }}" > .digest

      - name: Update cache
        if: steps.changed.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: .digest
          key: base-digest

      # - name: Auto tag release
